name: rust

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build, test, fmt, clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      # Default (fused-table) resource profile - DECISIONS.md D-35/D-38/D-39. `--all-features`
      # below also turns on `small-tables`, which changes production behavior (not just adds an
      # unrelated flag the way `alloc` does), so it no longer stands in for "test the default
      # profile" the way it used to - these explicit no-extra-features steps cover that instead.
      - run: cargo build --workspace
      - run: cargo build --workspace --no-default-features
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      # small-tables resource profile (DECISIONS.md D-35/D-38/D-39) - constrained-target table set.
      - run: cargo build --workspace --features dstu-core/small-tables
      - run: cargo build --workspace --no-default-features --features dstu-core/small-tables
      - run: cargo test --workspace --features dstu-core/small-tables
      - run: cargo clippy --workspace --features dstu-core/small-tables -- -D warnings
      # Every feature on at once, both profiles' flags combined - catches interaction bugs neither
      # side alone would.
      - run: cargo build --workspace --all-features
      - run: cargo test --workspace --all-features
      - run: cargo clippy --workspace --all-features -- -D warnings

  miri:
    name: cargo miri test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      # `+nightly` is required despite the nightly install above: rust-toolchain.toml pins
      # `stable` repo-wide, which overrides rustup's default toolchain for any cargo invocation
      # inside this checkout.
      - run: cargo +nightly miri test --workspace

  fuzz-smoke:
    name: cargo fuzz (short smoke run, not a full campaign)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      # Same rust-toolchain.toml override as the miri job above - `+nightly` is not optional here.
      - run: cargo +nightly fuzz run kupyna -- -max_total_time=60
        working-directory: crates/dstu-core

  audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny (licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
